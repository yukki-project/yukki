name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  static-checks:
    name: static checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: go vet
        run: go vet ./...

      - name: gofmt check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$unformatted"
            exit 1
          fi
        shell: bash

      - name: golangci-lint (depguard core isolation)
        # Enforces the CORE-002 architectural boundary: the 4 business-
        # core packages (internal/{workflow,provider,templates,artifacts})
        # cannot import cobra, wails, internal/uiapp, or any UI package.
        # See .golangci.yml for the full rule definition.
        #
        # Pinned to action v6 because it supports golangci-lint v1.x
        # (action v7+ requires golangci-lint v2.x and v2-format config).
        # Bump to v9 + v2-format config will be handled in DOC-001.
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62
          args: --timeout=3m

      - name: build
        run: go build -v ./...

  unit-tests:
    name: unit tests (${{ matrix.os }})
    needs: static-checks
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: unit tests (root + internal, prod build)
        # `.` covers the package main at the repo root (main.go, ui.go,
        # ui_prod.go, ui_prod_test.go), `./internal/...` covers the
        # 5 internal packages (workflow, provider, templates, artifacts,
        # uiapp, clilog).
        run: go test -race -coverprofile=coverage-unit.out . ./internal/...
        shell: bash

      - name: unit tests (mock-tagged variant)
        # Exercises ui_mock_test.go (//go:build mock). The prod variant
        # above already covers ui_prod_test.go (//go:build !mock).
        # Both are required to validate UI-001a invariant I1
        # (build-tag swap of the provider factory).
        run: go test -tags mock .
        shell: bash

      - uses: actions/upload-artifact@v4
        if: matrix.os == 'ubuntu-latest'
        with:
          name: coverage-unit
          path: coverage-unit.out

  integration-tests:
    name: integration tests (${{ matrix.os }})
    needs: static-checks
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: integration tests (tests/integration)
        run: go test -race -coverprofile=coverage-integration.out -coverpkg=./internal/... ./tests/integration/...
        shell: bash

      - uses: actions/upload-artifact@v4
        if: matrix.os == 'ubuntu-latest'
        with:
          name: coverage-integration
          path: coverage-integration.out

  e2e-tests:
    name: e2e tests (${{ matrix.os }})
    needs: static-checks
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: e2e tests (build yukki + fakeclaude, run subprocess)
        # E2E tests build the yukki binary themselves and exercise it as a
        # real subprocess with a fake claude binary on PATH. No race detector
        # because the test orchestrator forks the actual binary; -race only
        # instruments the test process itself.
        run: go test -timeout 5m ./tests/e2e/...
        shell: bash

  ui-build:
    name: ui build (${{ matrix.os }})
    needs: static-checks
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: install webkit2gtk-4.1 (Linux)
        # Ubuntu 24.04 (default for ubuntu-latest since early 2025) ships
        # WebKit2GTK 4.1, not 4.0. Wails v2.10+ supports 4.1 via build tag
        # `webkit2_41`.
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev
        shell: bash

      - name: install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
        shell: bash

      - name: wails build
        # On Linux, pass `-tags webkit2_41` so Wails compiles against
        # the 4.1 WebKit2GTK now standard on Ubuntu 24.04+.
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            wails build -platform linux/amd64 -tags webkit2_41
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            wails build -platform darwin/universal
          else
            wails build -platform windows/amd64
          fi
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: yukki-ui-${{ matrix.os }}
          path: build/bin/yukki-ui*
          if-no-files-found: warn
