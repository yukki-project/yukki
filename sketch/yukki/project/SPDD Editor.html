<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Éditeur SPDD — Yuki</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="spdd-editor.css">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; font-family: 'Inter', system-ui, sans-serif; }
  #root { height: 100%; }

  /* Each artboard hosts a full app — fixed size, scaled down by canvas */
  .yk-artboard {
    width: 1400px;
    height: 900px;
    background: var(--bg-page);
    overflow: hidden;
    position: relative;
    border-radius: 8px;
    box-shadow: 0 1px 0 rgba(0,0,0,0.08), 0 12px 40px rgba(0,0,0,0.12);
  }

  /* Section heading (above artboards) */
  .yk-canvas-section-head {
    font-family: 'Inter', sans-serif;
    font-size: 22px;
    font-weight: 600;
    color: #29261b;
    letter-spacing: -0.01em;
    margin-bottom: 4px;
  }
  .yk-canvas-section-sub {
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
    color: rgba(60,50,40,0.65);
    line-height: 1.5;
    max-width: 640px;
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>

<div id="root"></div>

<!-- shared modules -->
<script src="spdd-data.js"></script>
<script type="text/babel" src="spdd-icons.jsx"></script>
<script type="text/babel" src="spdd-shell.jsx"></script>
<script type="text/babel" src="spdd-toc.jsx"></script>
<script type="text/babel" src="spdd-sections.jsx"></script>
<script type="text/babel" src="spdd-ai.jsx"></script>
<script type="text/babel" src="spdd-editor.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<!-- the artboards composition -->
<script type="text/babel" src="spdd-app.jsx"></script>
</body>
</html>
