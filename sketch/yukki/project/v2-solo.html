<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>v2 review</title>
<link rel="stylesheet" href="hifi-frames.css?v=2" />
<link rel="stylesheet" href="hifi-frames-v2.css?v=3" />
<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
  #wrap { width: 1440px; height: 900px; transform-origin: 0 0; }
  #root { width: 1440px; height: 900px; }
</style>
</head>
<body>
<div id="wrap"><div id="root"></div></div>
<script>
function fit(){
  const w = window.innerWidth, h = window.innerHeight;
  const s = Math.min(w/1440, h/900);
  document.getElementById('wrap').style.transform = `scale(${s})`;
}
window.addEventListener('resize', fit); fit();
</script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="data.js"></script>
<script type="text/babel" src="hifi-frames-v2.jsx"></script>
<script type="text/babel">
  const mode = new URLSearchParams(location.search).get('mode') || 'dark';
  const Frame = mode === 'light' ? window.F_EditorV2_Light : window.F_EditorV2;
  ReactDOM.createRoot(document.getElementById('root')).render(<Frame />);
</script>
</body>
</html>
